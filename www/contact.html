</head>

<body>
  <header class="site-header">
    <nav>
      <a href="index.html" class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m8 3 4 8 5-5 5 15H2L8 3z" />
        </svg>
        Sky Hostels
      </a>
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="food-menu.html">Food Menu</a>

        <a href="contact.html" class="active">Contact</a>
        <a href="admission.html">Admission</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="section-header">
      <h1>Contact <span class="highlight">Us</span></h1>
      <p>Have questions? We're here to help you find your new home.</p>
    </div>

    <div class="contact-grid"
      style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 4rem;">
      <section class="contact-form-section">
        <form action="https://formsubmit.co/your@email.com" method="POST" class="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
          </div>
          <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" placeholder="10-digit mobile number"
              required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
        </form>
      </section>

      <section class="contact-details">
        <div class="map-wrapper"
          style="border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); margin-bottom: 2rem;">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d31015.57404197049!2d79.44544700024541!3d13.661001571635271!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a4d49420a7e8aa3%3A0x35ffc38d9573f0e2!2sSky%20Boys%20Hostel!5e0!3m2!1sen!2sin!4v1751433770340!5m2!1sen!2sin"
            width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <div class="contact-info-cards" style="display: grid; gap: 1.5rem;">
          <div class="info-card" style="display: flex; gap: 1rem; align-items: start;">
            <div class="icon-wrapper" style="margin: 0; width: 40px; height: 40px;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
              </svg>
            </div>
            <div>
              <h4 style="margin-bottom: 0.25rem;">Phone</h4>
              <p>+91-9094444115</p>
              <p>+91-9094444116</p>
            </div>
          </div>
          <div class="info-card" style="display: flex; gap: 1rem; align-items: start;">
            <div class="icon-wrapper" style="margin: 0; width: 40px; height: 40px;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2" />
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
              </svg>
            </div>
            <div>
              <h4 style="margin-bottom: 0.25rem;">Email</h4>
              <p>skyhostels2023@email.com</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <div class="footer-info">
        <h3>Sky Hostels</h3>
        <p>Premium Living Spaces for Students</p>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2024 Sky Hostels | <a href="admin/index.html">Admin Login</a></p>
      </div>
    </div>
  </footer>
  <script src="js/main.js"></script>
</body>

</html>
